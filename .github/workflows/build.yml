name: Build Secure Folder APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || echo "No gradlew found, will use local gradle"

    - name: Build Debug APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          gradle wrapper
          ./gradlew assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SecureFolder-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
